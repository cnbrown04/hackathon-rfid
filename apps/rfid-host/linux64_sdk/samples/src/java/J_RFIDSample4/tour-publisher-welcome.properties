# Reader welcome (FX7500 with 4 antennas)
host=192.168.50.105
port=5084

# Any antenna without a value is disabled.
antenna.txPowerIndex.1=100
antenna.txPowerIndex.2=100
antenna.txPowerIndex.3=100
antenna.txPowerIndex.4=100
antenna.txPowerIndex.5=
antenna.txPowerIndex.6=
antenna.txPowerIndex.7=
antenna.txPowerIndex.8=

# MQTT publish
mqtt.brokerUrl=tcp://127.0.0.1:1883
mqtt.topicRoot=rfid
mqtt.clientId=
mqtt.username=
mqtt.password=

# Global EPC mapping: API (people.tour_id) then local CSV
epc.mapUrl=http://127.0.0.1:3002/api/epc-tour-map
epc.mapCsv=tour-epc-map.csv
prefilter.epcs=E28011606000020E2BFA596B,E28011606000020E2BFA593B,E2806A9600004017ADA99656,E2806A9600005017ADA99657

# Runtime
runMs=0
siteId=rfid-lab
readerId=welcome

# Trigger tuning
trigger.secondsSinceLastRead=1
trigger.minDwellSeconds=0

# Rolling window
window.seconds=30
window.checkSeconds=2

# Debug logging
debug.logReads=true
debug.logUnknownReads=false
