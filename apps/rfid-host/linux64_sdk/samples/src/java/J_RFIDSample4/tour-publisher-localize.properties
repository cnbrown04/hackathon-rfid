# Reader localize
host=192.168.50.101
port=5084

# Optional antenna TX power index controls
# Any antenna without a value is disabled.
antenna.txPowerIndex.1= 60
antenna.txPowerIndex.2= 60
antenna.txPowerIndex.3= 60
antenna.txPowerIndex.4= 
antenna.txPowerIndex.5=
antenna.txPowerIndex.6=
antenna.txPowerIndex.7=
antenna.txPowerIndex.8=



# MQTT publish
mqtt.brokerUrl=tcp://127.0.0.1:1883
mqtt.topicRoot=rfid
mqtt.clientId=
mqtt.username=
mqtt.password=

# EPC mapping: load people with tour_id from API first (HTTP_PORT default 3002), then merge CSV
epc.mapUrl=http://127.0.0.1:3002/api/epc-tour-map
epc.mapCsv=tour-epc-map.csv
# Force focused prefilter for localization tags to improve responsiveness
prefilter.epcs=E280699500005001FAD8C990,E280699500005001FAD8C991,E280699500005001FAD8C992

# Runtime
runMs=0
siteId=rfid-lab
readerId=localize

# Trigger tuning
trigger.secondsSinceLastRead=1
trigger.minDwellSeconds=0

# Rolling window
window.seconds=5
window.checkSeconds=1

# Emit steady updates without requiring departure
event.emitPerRead=false
event.emitEveryCheck=true
event.emitEveryCheckType=TOUR_WINDOW_UPDATE
# write-throttling knobs to avoid DB queue buildup
event.emitEveryCheckMinIntervalMs=800
event.emitEveryCheckMaxSilenceMs=1500
event.emitEveryCheckMinRssiDeltaDb=0.6
event.emitEveryCheckMinReadDeltaPct=10

# Debug logging
debug.logReads=false
debug.logUnknownReads=false
