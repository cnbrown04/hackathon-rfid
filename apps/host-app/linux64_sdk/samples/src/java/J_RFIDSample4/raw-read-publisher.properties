# Reader connection
host=192.168.50.101
port=5084

# Identity in payload/topic
reader.id=reader-1
source.id=reader1-raw-v1

# Run forever by default; set >0 for timed run
runMs=0

# MQTT publish
mqtt.brokerUrl=tcp://127.0.0.1:1883
mqtt.clientId=
mqtt.username=
mqtt.password=

# Use only the two demo antennas
antennas.enabled=1,2

# Optional TX power index per antenna
antenna.txPowerIndex.1=100
antenna.txPowerIndex.2=100
