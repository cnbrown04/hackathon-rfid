# Reader
host=192.168.50.101
port=5084

# Optional antenna TX power index controls
# Any antenna without a value is disabled.
antenna.txPowerIndex.1= 200
antenna.txPowerIndex.2= 200
antenna.txPowerIndex.3= 200
antenna.txPowerIndex.4=
antenna.txPowerIndex.5=
antenna.txPowerIndex.6=
antenna.txPowerIndex.7=
antenna.txPowerIndex.8=



# MQTT publish
mqtt.brokerUrl=tcp://127.0.0.1:1883
mqtt.topicRoot=rfid
mqtt.clientId=
mqtt.username=
mqtt.password=

# EPC mapping
epc.mapCsv=tour-epc-map.csv
defaultTourId=tour-demo-001

# Runtime
runMs=0
siteId=rfid-lab
readerId=reader-01

# Trigger tuning
trigger.secondsSinceLastRead=5
trigger.minDwellSeconds=0

# Rolling window
window.seconds=30
window.checkSeconds=2

# Debug logging
debug.logReads=true
debug.logUnknownReads=false
