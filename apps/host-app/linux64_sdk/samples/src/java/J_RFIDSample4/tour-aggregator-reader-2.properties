# Reader 2 (FX7500 with 4 antennas)
host=192.168.50.105
port=5084

# Any antenna without a value is disabled.
antenna.txPowerIndex.1=100
antenna.txPowerIndex.2=100
antenna.txPowerIndex.3=100
antenna.txPowerIndex.4=100
antenna.txPowerIndex.5=
antenna.txPowerIndex.6=
antenna.txPowerIndex.7=
antenna.txPowerIndex.8=

# MQTT publish
mqtt.brokerUrl=tcp://127.0.0.1:1883
mqtt.topicRoot=rfid
mqtt.clientId=
mqtt.username=
mqtt.password=

# Global EPC mapping shared across readers
epc.mapCsv=tour-epc-map.csv
defaultTourId=tour-demo-001

# Runtime
runMs=0
siteId=rfid-lab
readerId=reader-2

# Trigger tuning
trigger.secondsSinceLastRead=15
trigger.minDwellSeconds=0

# Rolling window
window.seconds=30
window.checkSeconds=2

# Debug logging
debug.logReads=true
debug.logUnknownReads=false
